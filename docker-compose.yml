services:
  local-book-backend:
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${API_PORT:-3007}:3000'
    env_file:
      - .env
    depends_on:
      local-book-db:
        condition: service_healthy

  local-book-db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U localbook -d localbook']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
